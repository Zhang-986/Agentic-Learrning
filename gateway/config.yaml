# AI Gateway 配置文件
server:
  port: 8080
  mode: debug  # debug | release

# 网关自身的 API Key（客户端调用网关时使用）
# 生产环境请通过环境变量注入，不要在配置文件中硬编码
auth:
  api_keys:
    - "${GATEWAY_API_KEY:test-key-001}"

# 限流配置
rate_limit:
  requests_per_second: 10
  burst: 20

# 智谱 AI 配置
zhipu:
  api_key: "${ZHIPU_API_KEY}"
  base_url: "https://open.bigmodel.cn/api/paas/v4"
  default_model: "GLM-4.7-FlashX"
  timeout: 120
